version: "3.3"

services:
  app:
    image: ircan/corail:latest
    container_name: Website_Corail
    env_file: .env
    environment:
      - DB_PATH=/data/db.sqlite3
    ports:
      - "9090:80"
    volumes:
      - sqlite_data:/data
      - media_data:/app/media
    restart: unless-stopped

volumes:
  sqlite_data:
  media_data:
